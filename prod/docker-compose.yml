name: 'rinha2-back-end-rust'

services:

  webapi1-rust: &webapi1
    image: ghcr.io/jonathanperis/rinha2-back-end-rust:latest
    container_name: webapi-1-rust-rinha
    depends_on:
      db:
        condition: service_healthy
    restart: always      
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/rinha?sslmode=disable"
    ports:
      - "8081:8080"    
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "100MB"

  webapi2-rust:
    <<: *webapi1
    container_name: webapi-2-rust-rinha
    ports:
      - "8082:8080"

  db:
    image: postgres:16.7-alpine
    container_name: db-rinha
    restart: always
    volumes:
      - ./conf/rinha.dump.sql:/docker-entrypoint-initdb.d/rinha.dump.sql:ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rinha
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "330MB"
    # WARNING: synchronous_commit=0, fsync=0, full_page_writes=0 disable durability for load-test performance. Do NOT use in production with real data.
    command: postgres -c checkpoint_timeout=600 -c max_wal_size=4096 -c synchronous_commit=0 -c fsync=0 -c full_page_writes=0

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-rinha
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: 
      - webapi1-rust
      - webapi2-rust
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "20MB"

  k6:
    image: ghcr.io/jonathanperis/rinha2-back-end-k6:latest
    container_name: k6-rinha
    environment:
      # Set MODE=dev to export data via xk6-influxdb, or MODE=prod to generate an HTML report.
      - MODE=prod
      - BASE_URL=http://nginx:9999
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_EXPORT=./reports/stress-test-report.html
    volumes:
      - "./conf/stress-test/reports:/app/reports"      
    depends_on:
      - nginx    
    ports:
      - "5665:5665"