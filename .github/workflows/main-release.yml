name: Main Release

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: ghcr.io/jonathanperis/rinha2-back-end-rust

jobs:
  setup-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
          # cache: cargo

      - name: Build the application
        run: cargo build --release --manifest-path ./src/WebApi/Cargo.toml

  build-push-amd64:
    needs: setup-build-test
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image (amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./src/WebApi
          file: ./src/WebApi/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest
          platforms: linux/amd64

  build-push-arm64:
    needs: build-push-amd64
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image (arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./src/WebApi
          file: ./src/WebApi/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest-arm64
          platforms: linux/arm64/v8

  merge-manifest:
    needs: [build-push-amd64, build-push-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}@${{ needs.build-push-amd64.outputs.digest }} \
            ${{ env.IMAGE }}@${{ needs.build-push-arm64.outputs.digest }}

  container-test:
    needs: build-push-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: |
          docker compose -f ./prod/docker-compose.yml up nginx -d
          sleep 10

      - name: Test Healthcheck Endpoint
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/healthz)
            if [ "$STATUS" -eq 200 ]; then
              echo "Healthcheck passed with status $STATUS"
              exit 0
            else
              echo "Healthcheck attempt $i failed with status $STATUS. Retrying..."
              sleep 2
            fi
          done
          echo "Healthcheck failed after 20 attempts."
          exit 1

  load-test:
    runs-on: ubuntu-latest
    needs: container-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Run Docker Compose for Load Test
        run: |
          docker compose -f ./prod/docker-compose.yml up k6 --build --force-recreate
          sleep 10

      # - name: Listing Files recursively
      #   run: find . -printf '%y %p\n'

      - name: Upload Stress Test Report Artifact
        uses: actions/upload-artifact@v7
        with:
          name: stress-test-report
          path: ./prod/conf/stress-test/reports/stress-test-report.html
